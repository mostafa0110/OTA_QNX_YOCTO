# STARTING POINT — RAUC system config. Validate slot devices in Spike B.
[system]
compatible=ota-rpi5
bootloader=custom
data-directory=/data/rauc

[keyring]
path=/etc/rauc/keyring.pem

# 'custom' bootloader backend shells out to the Raspberry Pi tryboot helper
# (set tryboot flag via vcmailbox / tryboot reboot) to flip A/B.
[handlers]
bootloader-custom-backend=/usr/lib/rauc/rpi-tryboot-backend.sh

[slot.rootfs.0]
device=/dev/mmcblk0p2
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=ext4
bootname=B
